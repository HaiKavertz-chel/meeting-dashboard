<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의 대시보드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
    --text:#1a1a1a;--text2:#555;--text3:#999;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
    --radius:8px;--radius-lg:12px;
    --shadow:0 2px 12px rgba(0,0,0,0.07);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
  .container{max-width:1100px;margin:0 auto;padding:24px 20px}

  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
  .role-tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:3px;gap:3px}
  .role-btn{padding:7px 18px;font-size:13px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--text2);font-weight:500;transition:.15s}
  .role-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1)}

  .summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;text-align:center}
  .stat-card .sv{font-size:26px;font-weight:700}
  .stat-card .sl{font-size:11px;color:var(--text3);margin-top:2px}

  .dept-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .df-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:var(--bg);color:var(--text2);transition:.12s;white-space:nowrap}
  .df-btn:hover{border-color:var(--border2)}
  .df-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

  .cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .cal-nav button{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:5px 14px;cursor:pointer;color:var(--text2);font-size:16px;transition:.12s}
  .cal-nav button:hover{background:var(--bg2)}
  .cal-nav span{font-size:16px;font-weight:700}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .day-label{text-align:center;font-size:11px;color:var(--text3);padding:5px 0;font-weight:700}
  .day-cell{min-height:100px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px;transition:.12s}
  .day-cell:hover{border-color:var(--border2)}
  .day-cell.other-month{background:var(--bg2)}
  .day-cell.other-month .day-num{color:var(--text3)}
  .day-cell.today{border:2px solid #378ADD}
  .day-num{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
  .today-num{background:#378ADD;color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
  .meeting-chip{font-size:9px;padding:2px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;line-height:1.7}
  .meeting-chip:hover{filter:brightness(.92)}
  .more-chip{font-size:9px;color:var(--text3);cursor:pointer;padding:1px 2px;font-weight:500}
  .more-chip:hover{color:var(--text2)}

  .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.22);z-index:99;display:none}
  .overlay.open{display:block}
  .panel{position:fixed;top:0;right:0;width:380px;height:100%;background:var(--bg);border-left:1px solid var(--border);z-index:100;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
  .panel.open{transform:translateX(0)}
  .panel-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
  .panel-header h2{font-size:15px;font-weight:700}
  .close-btn{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);padding:4px;line-height:1;border-radius:4px}
  .close-btn:hover{background:var(--bg2)}
  .panel-body{padding:20px;flex:1}
  .detail-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px}
  .badge-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .meeting-title-text{font-size:17px;font-weight:700;margin-bottom:14px;line-height:1.4}
  .meta-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;color:var(--text2)}
  .section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 6px}
  .content-box{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;font-size:13px;line-height:1.7;min-height:56px;white-space:pre-wrap;border:1px solid var(--border)}
  .delete-btn{width:100%;padding:10px;font-size:13px;border-radius:var(--radius);border:1px solid #fca5a5;background:#fff5f5;cursor:pointer;color:#dc2626;font-weight:600;margin-top:16px}
  .delete-btn:hover{background:#fee2e2}

  .add-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
  .add-form h3{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:6px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-row label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;font-weight:600}
  .form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;font-family:inherit;transition:.12s}
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,0.1)}
  .form-row textarea{min-height:80px;resize:vertical}
  .form-row.full{grid-column:1/-1}
  .submit-btn{width:100%;padding:11px;font-size:13px;font-weight:700;border-radius:var(--radius);border:none;background:#1a1a1a;cursor:pointer;color:#fff;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
  .submit-btn:hover{background:#333}
  .submit-btn:disabled{background:#ccc;cursor:not-allowed}

  .list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;background:var(--bg);transition:.12s}
  .list-item:hover{border-color:var(--border2);box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .list-left{display:flex;align-items:center;gap:8px;overflow:hidden}
  .list-title{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-dept{font-size:10px;color:var(--text3)}
  .list-meta{font-size:10px;color:var(--text3);flex-shrink:0;margin-left:8px}

  .date-item{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:.12s}
  .date-item:hover{border-color:var(--border2)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 22px;border-radius:var(--radius);opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;font-weight:500;box-shadow:var(--shadow)}
  .toast.show{opacity:1}

  .loading-bar{text-align:center;padding:40px;color:var(--text3);font-size:13px}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .empty{text-align:center;color:var(--text3);font-size:13px;padding:24px;background:var(--bg2);border-radius:var(--radius);border:1px dashed var(--border)}

  @media(max-width:640px){
    .summary-bar{grid-template-columns:repeat(2,1fr)}
    .panel{width:100%}
    .form-grid{grid-template-columns:1fr}
    .form-row.full{grid-column:1}
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📅 회의 대시보드</h1>
    <div class="role-tabs">
      <button class="role-btn active" id="btn-ceo" onclick="setRole('ceo')">👑 대표님 뷰</button>
      <button class="role-btn" id="btn-dept" onclick="setRole('dept')">✏️ 부서 입력</button>
    </div>
  </div>

  <!-- CEO View -->
  <div id="ceo-view">
    <div class="summary-bar" id="summary-bar">
      <div class="stat-card"><div class="spinner"></div></div>
      <div class="stat-card"></div><div class="stat-card"></div><div class="stat-card"></div>
    </div>
    <div class="dept-filter" id="dept-filter"></div>
    <div class="cal-nav">
      <button onclick="prevMonth()">&#8249;</button>
      <span id="month-label"></span>
      <button onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="loading-bar" style="grid-column:1/-1"><span class="spinner"></span>데이터 불러오는 중...</div>
    </div>
  </div>

  <!-- Dept View -->
  <div id="dept-view" style="display:none">
    <div class="add-form">
      <h3>➕ 회의 내용 등록</h3>
      <div class="form-grid">
        <div class="form-row full"><label>부서</label>
          <select id="f-dept">
            <option value="strategy">전략기획실</option>
            <option value="global">해외사업실</option>
            <option value="hr">HR팀</option>
            <option value="finance">재무실</option>
            <option value="bizops">사업관리팀</option>
            <option value="mediastrategy">미디어전략유닛</option>
            <option value="production">제작센터</option>
            <option value="mediainfra">미디어인프라센터</option>
            <option value="sports">스포츠사업센터</option>
            <option value="ad">광고센터</option>
            <option value="platform">플랫폼사업센터</option>
            <option value="design">디자인유닛</option>
            <option value="newsplayer">뉴스플레이어</option>
          </select>
        </div>
        <div class="form-row"><label>날짜</label><input type="date" id="f-date"></div>
        <div class="form-row"><label>시작 시간</label><input type="time" id="f-time" value="10:00"></div>
        <div class="form-row full"><label>회의 제목</label><input type="text" id="f-title" placeholder="예: 주간 전략 보고"></div>
        <div class="form-row full"><label>참석자</label><input type="text" id="f-members" placeholder="예: 김실장, 이팀장, 박과장"></div>
        <div class="form-row full"><label>회의 내용 요약</label><textarea id="f-summary" placeholder="주요 논의 사항을 입력하세요"></textarea></div>
        <div class="form-row full"><label>결정 사항 / 액션 아이템</label><textarea id="f-action" placeholder="결정된 사항이나 후속 조치를 입력하세요"></textarea></div>
        <div class="form-row full"><label>다음 회의 예정일 (선택)</label><input type="date" id="f-next"></div>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitMeeting()">💾 저장하기</button>
    </div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:600">이번 달 등록된 회의</p>
    <div id="dept-list"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <h2 id="panel-title">회의 상세</h2>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwN4YUz_g41iR2VwqFVLwDGl5FSIyFNvaGroxdqfB1aPuDFLQDM9zXu4UzysPLaZOpFVw/exec';

const DEPT_MAP = {
  strategy:      {label:'전략기획실',      dot:'#7F77DD', bg:'#EEEDFE', tc:'#3C3489', short:'전략기획'},
  global:        {label:'해외사업실',      dot:'#378ADD', bg:'#DDEEFF', tc:'#0C447C', short:'해외사업'},
  hr:            {label:'HR팀',            dot:'#EF9F27', bg:'#FEF3DC', tc:'#7A4A00', short:'HR'},
  finance:       {label:'재무실',           dot:'#D85A30', bg:'#FAECE7', tc:'#712B13', short:'재무'},
  bizops:        {label:'사업관리팀',      dot:'#1D9E75', bg:'#D8F5EC', tc:'#085041', short:'사업관리'},
  mediastrategy: {label:'미디어전략유닛',  dot:'#C850A0', bg:'#FBEAF6', tc:'#7A1F5A', short:'미디어전략'},
  production:    {label:'제작센터',        dot:'#639922', bg:'#EAF3DE', tc:'#2A5200', short:'제작'},
  mediainfra:    {label:'미디어인프라센터',dot:'#7A7A78', bg:'#EFEFED', tc:'#3A3A38', short:'미디어인프라'},
  sports:        {label:'스포츠사업센터',  dot:'#D97706', bg:'#FEF0D5', tc:'#7C3800', short:'스포츠'},
  ad:            {label:'광고센터',         dot:'#E24B4A', bg:'#FDEAEA', tc:'#8B1A1A', short:'광고'},
  platform:      {label:'플랫폼사업센터',  dot:'#2563EB', bg:'#DBEAFE', tc:'#1E3A8A', short:'플랫폼'},
  design:        {label:'디자인유닛',      dot:'#DB2777', bg:'#FCE7F3', tc:'#831843', short:'디자인'},
  newsplayer:    {label:'뉴스플레이어',    dot:'#059669', bg:'#D1FAE5', tc:'#064E3B', short:'뉴스플레이어'},
};

const DAYS = ['일','월','화','수','목','금','토'];
let meetings = [], currentY, currentM, role = 'ceo', activeFilter = 'all';

/* ── API ── */
function parseDate(val) {
  if (!val) return '';
  if (String(val).includes('T')) {
    const d = new Date(val);
    const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    const y = kst.getUTCFullYear();
    const m = String(kst.getUTCMonth() + 1).padStart(2,'0');
    const day = String(kst.getUTCDate()).padStart(2,'0');
    return y + '-' + m + '-' + day;
  }
  return String(val).slice(0,10);
}

function parseTime(val) {
  if (!val) return '';
  if (String(val).includes('T')) {
    const d = new Date(val);
    const h = String(d.getUTCHours()).padStart(2,'0');
    const min = String(d.getUTCMinutes()).padStart(2,'0');
    return h + ':' + min;
  }
  return String(val).slice(0,5);
}

async function fetchMeetings() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    meetings = Array.isArray(data) ? data.filter(r => r.id).map(r => ({
      ...r,
      date: parseDate(r.date),
      time: parseTime(r.time),
    })) : [];
  } catch(e) {
    meetings = [];
    showToast('데이터를 불러오지 못했습니다. 새로고침 해주세요.');
  }
  render();
}

async function apiPost(payload) {
  await fetch(API_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify(payload),
    headers: {'Content-Type': 'text/plain'}
  });
}

/* ── Render ── */
function render() {
  renderSummary();
  renderFilter();
  renderCalendar();
  renderDeptList();
}

function renderSummary() {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth() + 1;
  const p = n => String(n).padStart(2,'0');
  const mo = meetings.filter(x => x.date && x.date.startsWith(`${y}-${p(m)}`));
  const td = meetings.filter(x => x.date === `${y}-${p(m)}-${p(now.getDate())}`);
  document.getElementById('summary-bar').innerHTML = `
    <div class="stat-card"><div class="sv">${mo.length}</div><div class="sl">이번 달 회의</div></div>
    <div class="stat-card"><div class="sv">${td.length}</div><div class="sl">오늘 회의</div></div>
    <div class="stat-card"><div class="sv">${new Set(mo.map(x=>x.dept)).size}</div><div class="sl">참여 부서 수</div></div>
    <div class="stat-card"><div class="sv">${meetings.length}</div><div class="sl">전체 누적</div></div>`;
}

function renderFilter() {
  const btns = [['all','전체'], ...Object.entries(DEPT_MAP).map(([k,v])=>[k,v.label])];
  document.getElementById('dept-filter').innerHTML = btns.map(([k,l]) =>
    `<button class="df-btn ${activeFilter===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`
  ).join('');
}
function setFilter(k) { activeFilter = k; renderFilter(); renderCalendar(); }

function renderCalendar() {
  document.getElementById('month-label').textContent = `${currentY}년 ${currentM+1}월`;
  const first = new Date(currentY, currentM, 1);
  const last  = new Date(currentY, currentM+1, 0);
  const now   = new Date();
  let html = '';
  DAYS.forEach((d,i) => html += `<div class="day-label" style="${i===0?'color:#e24b4a':i===6?'color:#378ADD':''}">${d}</div>`);
  for (let i = 0; i < first.getDay(); i++) {
    const d = new Date(currentY, currentM, 1-first.getDay()+i);
    html += `<div class="day-cell other-month"><div class="day-num">${d.getDate()}</div></div>`;
  }
  for (let d = 1; d <= last.getDate(); d++) {
    const p = n => String(n).padStart(2,'0');
    const ds = `${currentY}-${p(currentM+1)}-${p(d)}`;
    const dow = new Date(currentY, currentM, d).getDay();
    const isToday = d===now.getDate() && currentM===now.getMonth() && currentY===now.getFullYear();
    const dm = meetings.filter(m => m.date===ds && (activeFilter==='all'||m.dept===activeFilter));
    const show = dm.slice(0,2), rest = dm.length-2;
    const numHtml = isToday
      ? `<span class="today-num">${d}</span>`
      : `<span style="color:${dow===0?'#e24b4a':dow===6?'#378ADD':'var(--text2)'}">${d}</span>`;
    html += `<div class="day-cell ${isToday?'today':''}">
      <div class="day-num">${numHtml}</div>
      ${show.map(m=>`<div class="meeting-chip" style="background:${DEPT_MAP[m.dept]?.bg||'#eee'};color:${DEPT_MAP[m.dept]?.tc||'#333'}" onclick="openDetail('${m.id}')" title="${DEPT_MAP[m.dept]?.label||''}: ${m.title}">${DEPT_MAP[m.dept]?.short||''} ${m.title}</div>`).join('')}
      ${rest>0?`<div class="more-chip" onclick="showDate('${ds}')">+${rest}개 더보기</div>`:''}
    </div>`;
  }
  const endDay = last.getDay();
  if (endDay < 6) for (let i=1; i<=6-endDay; i++) {
    const d = new Date(currentY, currentM+1, i);
    html += `<div class="day-cell other-month"><div class="day-num">${d.getDate()}</div></div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function renderDeptList() {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth()+1;
  const p = n => String(n).padStart(2,'0');
  const list = meetings.filter(x => x.date && x.date.startsWith(`${y}-${p(m)}`))
    .sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  if (!list.length) {
    document.getElementById('dept-list').innerHTML = `<div class="empty">이번 달 등록된 회의가 없습니다</div>`;
    return;
  }
  document.getElementById('dept-list').innerHTML = list.map(m => `
    <div class="list-item" onclick="openDetail('${m.id}')">
      <div class="list-left">
        <span class="badge-dot" style="background:${DEPT_MAP[m.dept]?.dot||'#ccc'}"></span>
        <div>
          <div class="list-title">${m.title}</div>
          <div class="list-dept">${DEPT_MAP[m.dept]?.label||m.dept}</div>
        </div>
      </div>
      <div class="list-meta">${String(m.date).slice(5)} ${m.time}</div>
    </div>`).join('');
}

/* ── Panel ── */
function openDetail(id) {
  const m = meetings.find(x => x.id==id);
  if (!m) return;
  const d = DEPT_MAP[m.dept] || {label:m.dept, dot:'#ccc', bg:'#eee', tc:'#333'};
  document.getElementById('panel-title').textContent = '회의 상세';
  document.getElementById('panel-body').innerHTML = `
    <div class="detail-badge" style="background:${d.bg};color:${d.tc}">
      <span class="badge-dot" style="background:${d.dot}"></span>${d.label}
    </div>
    <div class="meeting-title-text">${m.title}</div>
    <div class="meta-row"><span>📅</span>${m.date}</div>
    <div class="meta-row"><span>🕐</span>${m.time}</div>
    <div class="meta-row"><span>👥</span>${m.members||'—'}</div>
    <div class="section-label">회의 내용 요약</div>
    <div class="content-box">${m.summary||'—'}</div>
    <div class="section-label">결정 사항 / 액션 아이템</div>
    <div class="content-box">${m.action||'—'}</div>
    ${m.next?`<div class="section-label">다음 회의 예정</div><div class="meta-row"><span>📅</span>${m.next}</div>`:''}
    ${role==='dept'?`<button class="delete-btn" onclick="deleteMeeting('${m.id}')">🗑 이 회의 삭제</button>`:''}`;
  openPanel();
}

function showDate(ds) {
  const dm = meetings.filter(m => m.date===ds && (activeFilter==='all'||m.dept===activeFilter));
  if (!dm.length) return;
  document.getElementById('panel-title').textContent = `${ds.slice(5)} 회의 목록`;
  document.getElementById('panel-body').innerHTML = dm.map(m => {
    const d = DEPT_MAP[m.dept]||{label:m.dept,dot:'#ccc'};
    return `<div class="date-item" onclick="openDetail('${m.id}')">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">
        <span class="badge-dot" style="background:${d.dot}"></span>
        <strong style="font-size:13px">${m.title}</strong>
      </div>
      <span style="font-size:11px;color:var(--text3)">${d.label} · ${m.time}</span>
    </div>`;
  }).join('');
  openPanel();
}

function openPanel()  { document.getElementById('panel').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closePanel() { document.getElementById('panel').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

/* ── CRUD ── */
async function submitMeeting() {
  const date  = document.getElementById('f-date').value;
  const title = document.getElementById('f-title').value.trim();
  if (!date || !title) { showToast('날짜와 제목을 입력해주세요'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '저장 중...';
  const m = {
    id: 'm'+Date.now(),
    dept:    document.getElementById('f-dept').value,
    date, time: document.getElementById('f-time').value, title,
    members: document.getElementById('f-members').value.trim(),
    summary: document.getElementById('f-summary').value.trim(),
    action:  document.getElementById('f-action').value.trim(),
    next:    document.getElementById('f-next').value,
  };
  try {
    await apiPost(m);
    meetings.push(m);
    ['f-date','f-title','f-members','f-summary','f-action','f-next'].forEach(id => document.getElementById(id).value='');
    document.getElementById('f-time').value = '10:00';
    render();
    showToast('✅ 회의가 등록되었습니다');
  } catch(e) {
    showToast('저장에 실패했습니다. 다시 시도해주세요.');
  }
  btn.disabled = false; btn.textContent = '💾 저장하기';
}

async function deleteMeeting(id) {
  if (!confirm('이 회의를 삭제하시겠습니까?')) return;
  try {
    await apiPost({action:'delete', id});
    meetings = meetings.filter(m => m.id!=id);
    closePanel(); render();
    showToast('삭제되었습니다');
  } catch(e) {
    showToast('삭제에 실패했습니다.');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function setRole(r) {
  role = r;
  document.getElementById('btn-ceo').classList.toggle('active', r==='ceo');
  document.getElementById('btn-dept').classList.toggle('active', r==='dept');
  document.getElementById('ceo-view').style.display  = r==='ceo'  ? 'block' : 'none';
  document.getElementById('dept-view').style.display = r==='dept' ? 'block' : 'none';
}

function prevMonth() { currentM--; if(currentM<0){currentM=11;currentY--;} renderCalendar(); }
function nextMonth() { currentM++; if(currentM>11){currentM=0;currentY++;} renderCalendar(); }

/* ── Init ── */
const _now = new Date();
currentY = _now.getFullYear(); currentM = _now.getMonth();
const _p = n => String(n).padStart(2,'0');
document.getElementById('f-date').value = `${_now.getFullYear()}-${_p(_now.getMonth()+1)}-${_p(_now.getDate())}`;
document.getElementById('month-label').textContent = `${currentY}년 ${currentM+1}월`;
fetchMeetings();
</script>
